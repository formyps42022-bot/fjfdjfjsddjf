<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Уровни стажёров LM.inc — таблица рейтинга</title>
<style>
  :root {
    --header-bg: #2c3446;
    --header-fg: #ffffff;
    --row-alt: #eef1f5;
    --row: #ffffff;
    --border: #d7dde5;
    --page-bg: #f4f6f9;
    --text: #1c2230;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 24px 16px 60px;
    background: var(--page-bg);
    font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px;
  }
  .meta {
    font-size: 13px;
    color: #5a6270;
    margin-bottom: 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .meta button {
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 6px;
    padding: 5px 10px;
    cursor: pointer;
    font-size: 13px;
  }
  .meta button:hover { background: #f0f2f6; }
  #search {
    padding: 7px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    width: 180px;
  }
  .table-card {
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 4px 18px rgba(20, 25, 40, 0.08);
    border: 1px solid #1c2233;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 15px;
  }
  thead th {
    background: var(--header-bg);
    color: var(--header-fg);
    text-align: center;
    padding: 12px 8px;
    font-weight: 700;
    border-right: 1px solid rgba(255,255,255,0.12);
  }
  thead th:last-child { border-right: none; }
  tbody td {
    text-align: center;
    padding: 8px;
    border-bottom: 1px solid var(--border);
  }
  tbody tr:nth-child(even) { background: var(--row-alt); }
  tbody tr:nth-child(odd) { background: var(--row); }
  tbody tr.highlight { outline: 2px solid #2c3446; outline-offset: -2px; }
  .level-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-weight: 600;
  }
  .swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    border: 1px solid rgba(0,0,0,0.15);
  }
  .status {
    text-align: center;
    padding: 30px 10px;
    color: #5a6270;
    font-size: 14px;
  }
  footer {
    text-align: center;
    font-size: 12px;
    color: #8a91a0;
    margin-top: 16px;
  }
  footer a { color: #5a6270; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Уровни стажёров LM.inc</h1>
  <div class="meta">
    <span id="updatedLabel">Загрузка данных…</span>
    <input id="search" type="text" placeholder="Поиск по номеру пропуска" />
    <button id="refreshBtn">Обновить сейчас</button>
  </div>

  <div class="table-card">
    <table>
      <thead>
        <tr>
          <th>Место</th>
          <th>Номер пропуска</th>
          <th>Баллы</th>
          <th>Уровень</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4" class="status">Загрузка…</td></tr>
      </tbody>
    </table>
  </div>

  <footer>
    Данные обновляются автоматически из внутреннего источника LM.inc. Автообновление в этой вкладке — каждые 60 секунд.
    · <a href="admin/">Для организаторов</a>
  </footer>
</div>

<script>
  // Уровень -> [название, цвет фона, цвет текста] — соответствует легенде исходной системы
  const LEVELS = {
    0: ["Светло-серый", "#D9DEE7", "#111827"],
    1: ["Серебристый",  "#C0C7D2", "#111827"],
    2: ["Малиновый",    "#C2185B", "#FFFFFF"],
    3: ["Медно-рыжий",  "#B86B2E", "#FFFFFF"],
    4: ["Кислотно-жёлтый", "#D6F700", "#111827"],
    5: ["Тёмно-синий",  "#0A2E6F", "#FFFFFF"],
    6: ["Фиолетовый",   "#6D28D9", "#FFFFFF"],
    7: ["Тёмно-красный","#7F1D1D", "#FFFFFF"],
    8: ["Изумрудный",   "#047857", "#FFFFFF"],
    9: ["Чёрный",       "#090B10", "#FFFFFF"]
  };

  const tbody = document.getElementById("tbody");
  const updatedLabel = document.getElementById("updatedLabel");
  const searchInput = document.getElementById("search");
  const refreshBtn = document.getElementById("refreshBtn");

  let currentEmployees = [];

  function formatRating(r) {
    return Number.isInteger(r) ? String(r) : r.toFixed(1).replace(".", ",");
  }

  function levelInfo(level) {
    return LEVELS[level] || ["Неизвестный", "#D9DEE7", "#111827"];
  }

  function render(employees, filter) {
    const sorted = [...employees].sort((a, b) => {
      if (b.rating !== a.rating) return b.rating - a.rating;
      return a.serial.localeCompare(b.serial);
    });

    const term = (filter || "").trim();
    tbody.innerHTML = "";

    let shown = 0;
    sorted.forEach((emp, idx) => {
      if (term && !emp.serial.includes(term)) return;
      shown++;
      const [name, bg, fg] = levelInfo(emp.level);
      const tr = document.createElement("tr");
      if (term && emp.serial.includes(term)) tr.classList.add("highlight");
      tr.innerHTML = `
        <td>${idx + 1}</td>
        <td>${emp.serial}</td>
        <td>${formatRating(emp.rating)}</td>
        <td>
          <span class="level-cell">
            <span class="swatch" style="background:${bg}"></span>
            ${emp.level} (${name})
          </span>
        </td>
      `;
      tbody.appendChild(tr);
    });

    if (shown === 0) {
      tbody.innerHTML = `<tr><td colspan="4" class="status">Ничего не найдено по номеру «${term}»</td></tr>`;
    }
  }

  async function loadData() {
    try {
      const res = await fetch(`data.json?t=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      currentEmployees = data.employees || [];
      render(currentEmployees, searchInput.value);

      const updated = data.updatedAt ? new Date(data.updatedAt) : null;
      updatedLabel.textContent = updated
        ? `Обновлено: ${updated.toLocaleString("ru-RU")} · Всего: ${currentEmployees.length}`
        : `Всего: ${currentEmployees.length}`;
    } catch (err) {
      tbody.innerHTML = `<tr><td colspan="4" class="status">Не удалось загрузить data.json: ${err.message}</td></tr>`;
    }
  }

  searchInput.addEventListener("input", () => render(currentEmployees, searchInput.value));
  refreshBtn.addEventListener("click", loadData);

  loadData();
  setInterval(loadData, 60000); // подтягиваем свежий data.json раз в минуту
</script>
</body>
</html>
